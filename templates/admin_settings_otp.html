<!DOCTYPE html>
<html>
<head>
    <title>Admin Settings - OTP Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🔐 OTP Verification</h4>
                </div>
                <div class="card-body">
                    {% if email_sent %}
                    <div class="alert alert-success">
                        <strong>✓ OTP sent to your email!</strong><br>
                        <small>Check your email: {{ current_user.email }}</small>
                    </div>
                    {% else %}
                    <div class="alert alert-warning">
                        <strong>⚠ Email not configured!</strong><br>
                        <small>Configure email in Admin Settings to receive OTP via email.</small>
                    </div>
                    <div class="alert alert-info">
                        <strong>Your OTP Code:</strong> <span class="fs-3 fw-bold">{{ otp_code }}</span>
                        <br>
                        <small>এই কোডটি ৫ মিনিটের জন্য valid থাকবে</small>
                    </div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('verify_admin_otp') }}">
                        <div class="mb-3">
                            <label class="form-label">OTP Code লিখুন</label>
                            <input type="text" name="otp_code" class="form-control form-control-lg text-center" 
                                   placeholder="6-digit OTP" maxlength="6" required autofocus>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            ✓ Verify & Continue
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-link">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
